/* VER INSTRUCCIONES AL FINAL DEL ARCHIVO */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--teal:#0D7377;--green:#2E7D32;--blue:#1565C0;
  --purple:#6A1B9A;--orange:#E65100;--slate:#37474F;--olive:#558B2F;
  --indigo:#4527A0;--cyan:#00695C;--red:#B71C1C;--brick:#BF360C;
  --gold:#F5A623;--gray:#F2F6FA;--border:#CBD5E1;--white:#fff;
}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#EEF2F7;color:#1a1a2e;min-height:100vh}

/* ── TOPBAR ── */
#topbar{
  background:var(--navy);color:#fff;padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)
}
#topbar h1{font-size:15px;font-weight:700;letter-spacing:.3px}
#topbar p{font-size:11px;opacity:.75;margin-top:2px}
.topbar-right{display:flex;gap:10px;align-items:center}
#user-select{
  padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer
}
#user-select option{background:var(--navy);color:#fff}
#status-pill{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)
}
#status-pill.ok{background:#2E7D32;border-color:#2E7D32}
#status-pill.err{background:#B71C1C;border-color:#B71C1C}
#status-pill.saving{background:#E65100;border-color:#E65100}

/* ── LAYOUT ── */
#app{max-width:980px;margin:0 auto;padding:24px 16px}
#progress-bar{
  background:var(--navy);border-radius:8px;padding:16px 20px;margin-bottom:20px;
  display:flex;gap:6px;align-items:center;flex-wrap:wrap
}
.prog-step{
  padding:5px 12px;border-radius:14px;font-size:10px;font-weight:700;
  color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);cursor:pointer;
  transition:all .2s;white-space:nowrap
}
.prog-step.active{color:#fff;background:var(--teal);border-color:var(--teal)}
.prog-step.done{color:#fff;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}

/* ── TARJETA SECCIÓN ── */
.sec-card{
  background:#fff;border-radius:10px;margin-bottom:16px;
  overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)
}
.sec-head{
  display:flex;align-items:center;gap:12px;padding:12px 20px;
  color:#fff;cursor:pointer;user-select:none
}
.sec-head:hover{filter:brightness(1.08)}
.sec-num{
  width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0
}
.sec-head h2{font-size:12px;font-weight:700;flex:1}
.sec-chevron{font-size:14px;transition:transform .25s}
.sec-body{padding:18px 20px;border-top:2px solid;display:none}
.sec-card.open .sec-body{display:block}
.sec-card.open .sec-chevron{transform:rotate(180deg)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.full{grid-column:1/-1}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── CAMPOS ── */
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:11px;font-weight:700;color:#374151;letter-spacing:.2px}
.fld label .req{color:#B71C1C;margin-left:2px}
input[type=text],input[type=date],input[type=email],input[type=number],
input[type=tel],select,textarea{
  width:100%;padding:8px 11px;border:1.5px solid var(--border);
  border-radius:7px;font-size:12px;color:#1a1a2e;background:#fff;
  transition:border-color .2s,box-shadow .2s;font-family:inherit
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(13,115,119,.12)
}
input.err-field,select.err-field{border-color:#B71C1C!important;background:#FEF2F2}
textarea{resize:vertical;min-height:64px}

/* ── CHECKBOXES TIPO ACTO ── */
.acto-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:6px;padding:10px;background:#F8FAFC;
  border:1.5px solid var(--border);border-radius:8px
}
.acto-item{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  border-radius:6px;cursor:pointer;transition:background .15s;
  font-size:11px;border:1px solid transparent
}
.acto-item:hover{background:#E0F2FE}
.acto-item.sel{background:#CCFBF1;border-color:var(--teal);font-weight:600}
.acto-item input{width:15px;height:15px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}

/* ── RADIOS ── */
.radio-row{display:flex;gap:16px;flex-wrap:wrap;padding:6px 0}
.radio-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.radio-item input{accent-color:var(--teal);width:14px;height:14px}

/* ── RIESGO PILLS ── */
.riesgo-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.rpill{
  padding:7px 18px;border-radius:20px;border:2px solid;cursor:pointer;
  font-size:11px;font-weight:700;transition:all .2s;user-select:none
}
.rpill[data-v="BAJO"]{color:var(--green);border-color:var(--green)}
.rpill[data-v="MEDIO"]{color:#B45309;border-color:#B45309}
.rpill[data-v="ALTO"]{color:var(--orange);border-color:var(--orange)}
.rpill[data-v="MUY ALTO"]{color:var(--red);border-color:var(--red)}
.rpill.on[data-v="BAJO"]{background:#D1FAE5}
.rpill.on[data-v="MEDIO"]{background:#FEF3C7}
.rpill.on[data-v="ALTO"]{background:#FFEDD5}
.rpill.on[data-v="MUY ALTO"]{background:#FEE2E2}

/* ── CONDICIONALES ── */
.cond{display:none}

/* ── BOTONES ── */
.btn-row{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn{
  padding:12px 24px;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;border:none;transition:all .2s;font-family:inherit
}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:#0a5e63}
.btn-primary:disabled{background:#9CA3AF;cursor:not-allowed}
.btn-secondary{background:var(--navy);color:#fff}
.btn-secondary:hover{background:#132d54}
.btn-outline{background:#fff;color:var(--navy);border:2px solid var(--navy)}
.btn-outline:hover{background:var(--gray)}

/* ── MODAL CONFIRMACIÓN ── */
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:999;align-items:center;justify-content:center
}
#modal-overlay.show{display:flex}
#modal{
  background:#fff;border-radius:12px;padding:32px;max-width:420px;width:90%;
  text-align:center
}
#modal .icon{font-size:48px;margin-bottom:12px}
#modal h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px}
#modal p{font-size:13px;color:#555;margin-bottom:20px;line-height:1.6}
#modal .btn-row{justify-content:center}

<script>
// ── Estado global ─────────────────────────────────────────────
let currentUser = "";
let nivelRiesgo = "";
let apiOk = false;
let totalRegistros = 0;

// ── Secciones del formulario ──────────────────────────────────
const SECCIONES = [
  {id:"s1", titulo:"I. Información General de la Operación", color:"#0D7377", num:"I"},
  {id:"s2", titulo:"II. Identificación del Cliente — Persona Natural", color:"#1565C0", num:"II"},
  {id:"s3", titulo:"Cónyuge / Conviviente", color:"#6A1B9A", num:"↪"},
  {id:"s4", titulo:"III. Información Tributaria", color:"#E65100", num:"III"},
  {id:"s5", titulo:"IV. Perfil Económico y Origen de Fondos", color:"#37474F", num:"IV"},
  {id:"s6", titulo:"V. Beneficiario Final", color:"#558B2F", num:"V"},
  {id:"s7", titulo:"VI. Persona Jurídica", color:"#4527A0", num:"VI"},
  {id:"s8", titulo:"VII. Consultas en Bases Públicas", color:"#00695C", num:"VII"},
  {id:"s9", titulo:"VIII. Persona Expuesta Políticamente (PEP)", color:"#B71C1C", num:"VIII"},
  {id:"s10", titulo:"XI. Matriz de Evaluación de Riesgo", color:"#BF360C", num:"XI"},
  {id:"s11", titulo:"XII. Decisión Institucional", color:"#1B3A6B", num:"XII"},
  {id:"s12", titulo:"X. Uso Interno — De la Notaría", color:"#1B3A6B", num:"X"},
];

// ── Helper ────────────────────────────────────────────────────
function el(id){return document.getElementById(id)}
function v(id){const e=el(id);return e?e.value.trim():""}
function rv(name){const e=document.querySelector(`input[name="${name}"]:checked`);return e?e.value:""}
function chks(cls){return[...document.querySelectorAll(`.${cls}:checked`)].map(e=>e.value).join(", ")}
function sel(opts,name,required=false){
  return `<select id="${name}"${required?' class="req-sel"':''}>
    <option value="">— Seleccionar —</option>
    ${opts.map(o=>`<option>${o}</option>`).join("")}
  </select>`;
}
function fld(label,input,req=false){
  return`<div class="fld"><label>${label}${req?'<span class="req">*</span>':''}</label>${input}</div>`;
}
function radios(opts,name){
  return`<div class="radio-row">${opts.map(o=>`<label class="radio-item">
    <input type="radio" name="${name}" value="${o}"> ${o}</label>`).join("")}</div>`;
}

// ── Construir formulario ──────────────────────────────────────
function buildForm(){
  const fs = el("form-screen");

  // Progress bar
  const pb = el("progress-bar");
  pb.innerHTML = SECCIONES.map((s,i)=>
    `<div class="prog-step${i===0?' active':''}" onclick="scrollSec('${s.id}')">${s.num}. ${s.titulo.split("—")[0].replace(/^[IVX]+\.\s*/,"").substring(0,22)}</div>`
  ).join("")

  // Matrizadores en topbar
  const us = el("user-select");
  MATRIZADORES.forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;us.appendChild(o)});

  // Secciones
  fs.innerHTML = SECCIONES.map(s=>`
    <div class="sec-card" id="${s.id}">
      <div class="sec-head" style="background:${s.color}" onclick="toggleSec('${s.id}')">
        <div class="sec-num">${s.num}</div>
        <h2>${s.titulo}</h2>
        <span class="sec-chevron">▼</span>
      </div>
      <div class="sec-body" style="border-color:${s.color}20" id="body_${s.id}"></div>
    </div>`
  ).join("");

  // ── SECCIÓN I ──────────────────────────────────────────────
  el("body_s1").innerHTML=`
    <div class="g3">
      ${fld("Número de Matriz",`<input type="text" id="nro_matriz" placeholder="2026-001">`,true)}
      ${fld("Tipo de Interviniente",sel(["Vendedor","Comprador","Donante","Donatario","Acreedor","Deudor","Cedente","Cesionario","Otro"],"tipo_interv"),true)}
      ${fld("Fecha de la Operación",`<input type="date" id="fecha_op">`,true)}
      ${fld("Cuantía / Monto Total (USD)",`<input type="number" id="cuantia" placeholder="0.00" min="0" step="0.01">`)}
      ${fld("Avalúo Catastral (USD)",`<input type="number" id="avaluo" placeholder="0.00" min="0" step="0.01">`)}
      ${fld("Forma de Pago",sel(["Transferencia bancaria","Cheque","Efectivo","Mixto","Compensación"],"forma_pago"),true)}
      ${fld("Entidad Financiera",`<input type="text" id="entidad" placeholder="Nombre del banco...">`)}
      ${fld("N° de Cuenta",`<input type="text" id="nro_cuenta">`)}
      ${fld("Tipo de Cuenta",sel(["Cuenta Corriente","Cuenta Ahorros","Cuenta Empresarial"],"tipo_cuenta"))}
    </div>
    <div style="margin-top:16px">
      <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:8px">
        Tipo de Acto o Contrato — Marque todos los que correspondan
      </div>
      <div class="acto-grid" id="acto-grid">
        ${TIPO_ACTO_LISTA.map(a=>`
          <label class="acto-item" id="acto_${a.replace(/[^a-z]/gi,'_')}">
            <input type="checkbox" value="${a}" onchange="toggleActo(this)"> ${a}
          </label>`).join("")}
        <label class="acto-item" style="grid-column:1/-1" id="acto_otro_wrap">
          <input type="checkbox" id="acto_otro_chk" value="Otro" onchange="toggleActo(this)"> Otro:
          <input type="text" id="acto_otro_txt" placeholder="Especifique..." style="display:inline-block;width:200px;margin-left:8px;padding:4px 8px;font-size:11px" onclick="event.stopPropagation()">
        </label>
      </div>
    </div>`;

  // ── SECCIÓN II ─────────────────────────────────────────────
  el("body_s2").innerHTML=`
    <div class="g3">
      ${fld("Tipo de Identificación",sel(["Cédula","Pasaporte","RUC"],"tipo_id"))}
      ${fld("Cédula / Pasaporte",`<input type="text" id="cedula" placeholder="1712345678">`,true)}
      ${fld("RUC (si aplica)",`<input type="text" id="ruc_cliente" placeholder="0912345678001">`)}
      <div class="fld full">
        <label>Nombres Completos <span class="req">*</span></label>
        <input type="text" id="nombres" placeholder="Apellidos y nombres completos">

// ── Conexión API ─────────────────────────────────────────────
async function testConnection(){
  if(SHEET_ID==="PEGA_AQUI_EL_ID_DE_TU_GOOGLE_SHEET"){
    el("status-pill").textContent="⚙ Configurar API";
    el("status-pill").className="status-pill err";
    return;
  }
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A1?key=${API_KEY}`;
    const r=await fetch(url);
    if(r.ok){
      apiOk=true;
      el("status-pill").textContent="✓ Conectado";
      el("status-pill").className="status-pill ok";
      const countUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:A?key=${API_KEY}`;
      const cr=await fetch(countUrl); const cd=await cr.json();
      totalRegistros=(cd.values?.length||2)-2;
      if(totalRegistros<0)totalRegistros=0;
      if(currentUser)el("btn-save").disabled=false;
    }else throw new Error("API error");
  }catch(e){
    el("status-pill").textContent="✗ Sin conexión";
    el("status-pill").className="status-pill err";
  }
}

// ── Validar ──────────────────────────────────────────────────
function validar(){
  const reqs=[
    {id:"nro_matriz",label:"Número de Matriz"},
    {id:"tipo_interv",label:"Tipo de Interviniente"},
    {id:"fecha_op",label:"Fecha de la Operación"},
    {id:"forma_pago",label:"Forma de Pago"},
    {id:"cedula",label:"Cédula / Pasaporte"},
    {id:"nombres",label:"Nombres Completos"},
  ];
  const errs=[];
  if(!currentUser)errs.push("Seleccionar Matrizador en la barra superior");
  reqs.forEach(r=>{
    const e=el(r.id);
    if(!e||!e.value.trim()){errs.push(r.label);if(e)e.classList.add("err-field");}
    else if(e)e.classList.remove("err-field");
  });
  return errs;
}

// ── Guardar ──────────────────────────────────────────────────
async function guardarRegistro(){
  const errs=validar();
  if(errs.length){
    mostrarModal("⚠️","Campos requeridos incompletos",
      "Por favor complete: "+errs.join(" · "),false);
    return;
  }
  el("btn-save").disabled=true;
  el("btn-save").textContent="⏳ Guardando...";
  el("status-pill").textContent="⏳ Guardando";
  el("status-pill").className="status-pill saving";

  const datos=recolectarDatos();
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A1:append?valueInputOption=USER_ENTERED&key=${API_KEY}`;

  try{
    const resp=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({values:[datos]})
    });
    if(resp.ok){
      totalRegistros++;
      el("status-pill").textContent="✓ Conectado";
      el("status-pill").className="status-pill ok";
      el("btn-save").textContent="💾 Guardar en Google Sheets";
      el("btn-save").disabled=false;
      mostrarModal("✅","Guardado exitosamente",
        `Formulario N° ${datos[0]} de ${currentUser} registrado correctamente en Google Sheets.`,true);
    }else{
      const e=await resp.json();
      throw new Error(e.error?.message||"Error al guardar");
    }
  }catch(err){
    el("btn-save").disabled=false;
    el("btn-save").textContent="💾 Guardar en Google Sheets";
    el("status-pill").textContent="✗ Error";
    el("status-pill").className="status-pill err";
    mostrarModal("❌","Error al guardar",
      "No se pudo guardar. Verifique su conexión y la configuración de la API. Detalle: "+err.message,false);
  }
}

function mostrarModal(icon,title,msg,success){
  el("modal-icon").textContent=icon;
  el("modal-title").textContent=title;
  el("modal-msg").textContent=msg;
  el("modal-overlay").classList.add("show");
  if(!success){
    document.querySelector("#modal .btn-secondary").style.display="none";
    document.querySelector("#modal .btn-primary").textContent="Cerrar";
    document.querySelector("#modal .btn-primary").onclick=cerrarModal;
  }else{
    document.querySelector("#modal .btn-secondary").style.display="inline-block";
    document.querySelector("#modal .btn-primary").textContent="+ Nuevo";
    document.querySelector("#modal .btn-primary").onclick=()=>{cerrarModal();limpiarFormulario();};
  }
}

        <div class="pd-bases" style="margin-bottom:6px">
          ${bases.map(b=>`<div class="pd-acto"><div class="pd-box${b.on?" on":""}">${b.on?"✓":""}</div><span style="font-size:7.5pt">${b.label}</span></div>`).join("")}
        </div>
        ${fv("Fecha de Consulta",v(81))}

    <div class="pd-sec">
      ${sh("XI","MATRIZ DE EVALUACIÓN DE RIESGO","#BF360C")}
      <div class="pd-sec-body">
        <div class="pd-lbl" style="margin-bottom:4px">Factores Identificados</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;margin-bottom:7px">
          ${RIESGO_FACTORES.map(f=>{
            const on=[...document.querySelectorAll(".riesgo_factor:checked")].some(e=>e.value===f);
            return`<div class="pd-acto"><div class="pd-box${on?" on":""}">${on?"✓":""}</div><span style="font-size:7.5pt">${f}</span></div>`;
          }).join("")}
          ${datos[100]?`<div class="pd-acto" style="grid-column:1/-1"><div class="pd-box on">✓</div><span style="font-size:7.5pt">Otro: ${datos[100]}</span></div>`:""}
        </div>
        <div>
          <span style="font-size:7.5pt;font-weight:700;color:#555">Nivel de Riesgo:&nbsp;</span>
          <span class="pd-riesgo" style="background:${rs.bg};color:${rs.c};border-color:${rs.c}">
            ${nivelRiesgo||"— Sin asignar —"}
          </span>
        </div>
      </div>
    </div>

    <div class="pd-sec">
      ${sh("XII","DECISIÓN INSTITUCIONAL","#1B3A6B")}

    </div>

    <div class="pd-sec">
      ${sh("IX","DECLARACIÓN JURAMENTADA DEL CLIENTE","#1B3A6B")}
      <div class="pd-sec-body" style="font-size:7.5pt;line-height:1.4;color:#333">

        Cantón Quito a verificar la información en bases públicas y privadas conforme la normativa
        vigente de prevención de lavado de activos.
      </div>
    </div>

    <div class="pd-firma">
      <div class="pd-firma-box">
        <div class="pd-firma-line"></div>
        <div class="pd-firma-lbl">
          Firma del Compareciente: ${datos[88]||"_________________________"}<br>
          Fecha: ${datos[89]||"____________________"}
        </div>
      </div>
      <div class="pd-firma-box">
        <div class="pd-firma-line"></div>
        <div class="pd-firma-lbl">
          Firma del Funcionario: ${datos[90]||"_________________________"}<br>
          Fecha: ${datos[91]||"____________________"}
        </div>
      </div>
    </div>

    <div class="pd-footer">
      Formulario Debida Diligencia — Notaría 62 del Cantón Quito &nbsp;|&nbsp;
      Prevención de Lavado de Activos 2026 &nbsp;|&nbsp;
      N° ${v(0)||"___"} &nbsp;|&nbsp; Generado: ${hoy}
    </div>
  </div>`;

  setTimeout(()=>window.print(),200);
}
